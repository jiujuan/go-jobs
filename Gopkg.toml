# Gopkg.toml example
#
# Refer to https://golang.github.io/dep/docs/Gopkg.toml.html
# for detailed Gopkg.toml documentation.
#
#required = ["github.com/user/thing/cmd/thing"]
#ignored = ["github.com/user/project/pkgX", "bitbucket.org/user/project/pkgA/pkgY"]

#[[constraint]]
#  name = "github.com/user/project"
#  version = "1.0.0"

required = ["github.com/gin-gonic/gin"]
[[constraint]]
  name = "github.com/gin-gonic/gin"
  version = "1.3.0"
  source = "github.com/gin-gonic/gin"

[[constraint]]
  name = "github.com/jinzhu/gorm"
  version = "1.9.2"
  source = "github.com/jinzhu/gorm"

[[constraint]]
  name = "github.com/Sirupsen/logrus"
  version = "1.3.0"
  source = "github.com/Sirupsen/logrus"

required = ["github.com/jakecoffman/cron"]
[[constraint]]
  name = "github.com/jakecoffman/cron"
  version = "v1"
  source = "github.com/jakecoffman/cron"
#
# [[constraint]]
#   name = "github.com/user/project2"
#   branch = "dev"
#   source = "github.com/myfork/project2"
#
# [[override]]
#   name = "github.com/x/y"
#   version = "2.4.0"
#
# [prune]
#   non-go = false
#   go-tests = true
#   unused-packages = true


[prune]
  go-tests = true
  unused-packages = true
