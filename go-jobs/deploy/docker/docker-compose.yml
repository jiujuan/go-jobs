version: "3.9"

# ============================================================
# go-jobs v3: full production stack with Etcd + ES
# Usage: docker compose up -d
# ============================================================

services:

  # ── MySQL ────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: go-jobs-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "password"
      MYSQL_DATABASE: "go_jobs"
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../migration/V1__init_schema.sql:/docker-entrypoint-initdb.d/01_v1.sql
      - ../../migration/V2__alarm_and_stats.sql:/docker-entrypoint-initdb.d/02_v2.sql
      - ../../migration/V3__child_job_and_metrics.sql:/docker-entrypoint-initdb.d/03_v3.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: go-jobs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Etcd (单节点，生产用 3 节点集群) ───────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.13
    container_name: go-jobs-etcd
    restart: unless-stopped
    ports:
      - "2379:2379"
      - "2380:2380"
    command:
      - etcd
      - --name=etcd0
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=etcd0=http://etcd:2380
      - --data-dir=/etcd-data
    volumes:
      - etcd_data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ElasticSearch ────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: go-jobs-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Scheduler / Admin (node 1) ───────────────────────────────
  admin-1:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.admin
    container_name: go-jobs-admin-1
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      etcd:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      GOJOBS_MYSQL_DSN: "root:password@tcp(mysql:3306)/go_jobs?charset=utf8mb4&parseTime=True&loc=Local"
      GOJOBS_REDIS_ADDR: "redis:6379"
      GOJOBS_ETCD_ENDPOINTS: "etcd:2379"
      GOJOBS_ES_ADDRESSES: "http://elasticsearch:9200"
      GOJOBS_ES_ENABLED: "true"
      GOJOBS_SERVER_MODE: "release"
      GOJOBS_SERVER_PORT: "8080"
    volumes:
      - ../../config/config.yaml:/app/config/config.yaml:ro
      - admin1_logs:/app/logs

  # ── Scheduler / Admin (node 2) ───────────────────────────────
  admin-2:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.admin
    container_name: go-jobs-admin-2
    restart: unless-stopped
    depends_on:
      - admin-1
    ports:
      - "8081:8081"
    environment:
      GOJOBS_MYSQL_DSN: "root:password@tcp(mysql:3306)/go_jobs?charset=utf8mb4&parseTime=True&loc=Local"
      GOJOBS_REDIS_ADDR: "redis:6379"
      GOJOBS_ETCD_ENDPOINTS: "etcd:2379"
      GOJOBS_ES_ADDRESSES: "http://elasticsearch:9200"
      GOJOBS_ES_ENABLED: "true"
      GOJOBS_SERVER_MODE: "release"
      GOJOBS_SERVER_PORT: "8081"
    volumes:
      - ../../config/config.yaml:/app/config/config.yaml:ro
      - admin2_logs:/app/logs

  # ── Executor ─────────────────────────────────────────────────
  executor:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.executor
    container_name: go-jobs-executor-1
    restart: unless-stopped
    depends_on:
      - admin-1
    environment:
      GOJOBS_EXECUTOR_ADMINURL: "http://admin-1:8080"
      GOJOBS_EXECUTOR_PORT: "9901"
    volumes:
      - ../../config/executor.dev.yaml:/app/config/executor.dev.yaml:ro
      - executor_logs:/app/logs

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: go-jobs-frontend
    restart: unless-stopped
    depends_on:
      - admin-1
    ports:
      - "80:80"
    volumes:
      - ../../go-jobs-admin/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql_data:
  redis_data:
  etcd_data:
  es_data:
  admin1_logs:
  admin2_logs:
  executor_logs:
